<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fairgo — Live trip</title>
<meta name="description" content="Follow a Fairgo trip live.">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--brand:#0a9e78;--brand2:#0b63d6;--fg:#0d1220;--muted:#5b6472;--line:#e7eaf0;--card:#fff;}
  @media(prefers-color-scheme:dark){:root{--fg:#eef1f6;--muted:#9aa4b2;--line:#1e2430;--card:#12161f;}}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--fg)}
  #map{position:fixed;inset:0;background:#e9ecf1}
  .brand{position:fixed;top:calc(env(safe-area-inset-top) + 12px);left:12px;z-index:600;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;
    font-weight:800;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .dot{width:14px;height:14px;border-radius:5px;background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .panel{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:600;
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;
    box-shadow:0 8px 30px rgba(0,0,0,.18);max-width:520px;margin:0 auto}
  .status{font-size:13px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.04em}
  .who{font-size:20px;font-weight:800;margin:4px 0 2px}
  .sub{color:var(--muted);font-size:15px}
  .plate{display:inline-block;margin-top:8px;font-weight:800;letter-spacing:2px;padding:4px 10px;
    border:2px solid var(--line);border-radius:8px;font-variant-numeric:tabular-nums}
  .ended{text-align:center}
  .ended .who{color:var(--muted)}
  .leaflet-container{font:inherit}
</style>
</head>
<body>
<div class="brand"><span class="dot"></span> Fairgo</div>
<div id="map"></div>
<div class="panel" id="panel"><div class="status" id="st">Connecting…</div><div class="who" id="who">Loading trip</div><div class="sub" id="sub"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPA = "https://213.199.60.210.sslip.io";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgzNTg2MzAwLCJleHAiOjIwOTg5NDYzMDB9.0nfXdnMuWD3HPU7e9Lf_4TGuAxbEg6wRYjN2-h5vKmM";
const q = new URLSearchParams(location.search);
const rideId = q.get('r'), token = q.get('t');
const dark = matchMedia('(prefers-color-scheme:dark)').matches;

const map = L.map('map', {zoomControl:false, attributionControl:true}).setView([48.8566,2.3522], 12);
L.tileLayer(`https://{s}.basemaps.cartocdn.com/${dark?'dark_all':'light_all'}/{z}/{x}/{y}{r}.png`,
  {subdomains:'abcd', maxZoom:19, attribution:'© OpenStreetMap © CARTO'}).addTo(map);

function pin(color){return L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
  html:`<div style="width:20px;height:20px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`});}
function car(){return L.divIcon({className:'',iconSize:[34,34],iconAnchor:[17,17],
  html:`<div style="width:34px;height:34px;border-radius:50%;background:#0a9e78;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:17px">🚗</div>`});}

let pickupM, dropoffM, carM, fitted=false;
const st=document.getElementById('st'), who=document.getElementById('who'), sub=document.getElementById('sub'), panel=document.getElementById('panel');

async function poll(){
  if(!rideId||!token){ show('Invalid link','This trip link is missing or malformed.'); return; }
  try{
    const res = await fetch(`${SUPA}/rest/v1/rpc/public_ride_track`,{method:'POST',
      headers:{'apikey':ANON,'Content-Type':'application/json'},
      body:JSON.stringify({p_ride_id:rideId,p_token:token})});
    const d = await res.json();
    if(!d){ show('Link not valid','This trip link is not valid.'); return; }
    if(d.active===false){ ended(); return; }
    render(d);
  }catch(e){ st.textContent='Reconnecting…'; }
}

const STATUS = {accepted:'Driver on the way', driver_arrived:'Driver has arrived', in_progress:'On the trip'};
function render(d){
  st.textContent = STATUS[d.status] || 'Live';
  const dr = d.driver;
  if(dr){
    who.textContent = dr.name ? `${dr.name} is driving` : 'Your driver';
    sub.innerHTML = (dr.vehicle||'') + (dr.plate?`<br><span class="plate">${dr.plate}</span>`:'');
  }
  const P=d.pickup, D=d.dropoff;
  if(P){ pickupM = pickupM||L.marker([P.lat,P.lng],{icon:pin('#0a9e78')}).addTo(map); }
  if(D){ dropoffM = dropoffM||L.marker([D.lat,D.lng],{icon:pin('#e5484d')}).addTo(map); }
  const pts=[];
  if(P) pts.push([P.lat,P.lng]);
  if(D) pts.push([D.lat,D.lng]);
  if(dr && dr.lat!=null){
    if(carM) carM.setLatLng([dr.lat,dr.lng]); else carM=L.marker([dr.lat,dr.lng],{icon:car(),zIndexOffset:1000}).addTo(map);
    pts.push([dr.lat,dr.lng]);
  }
  if(!fitted && pts.length>=2){ map.fitBounds(pts,{padding:[70,70],maxZoom:15}); fitted=true; }
}
function ended(){ panel.classList.add('ended'); st.textContent='Trip ended'; who.textContent='This trip has ended'; sub.textContent='The live link is no longer active.'; if(carM){map.removeLayer(carM);carM=null;} clearInterval(timer); }
function show(t,s){ st.textContent=''; who.textContent=t; sub.textContent=s; }

poll();
const timer = setInterval(poll, 5000);
</script>
</body>
</html>
